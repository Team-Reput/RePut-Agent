<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeremy – RePut’s ESG Assistant</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="app-container">
        <!-- <header class="chat-header">
            <div class="header-content">
                <div class="logo-area">
                    <div class="status-dot"></div>
                    <h1>Jeremy</h1>
                </div>
                <p class="subtitle">RePut’s ESG & Supply-Chain Assistant</p>
            </div>
        </header> -->

        <main class="chat-area" id="chat-area">
            <div class="welcome-message">
                <div class="bot-avatar">
                    <img src="{{ url_for('static', filename='images/logo.png') }}" alt="RePut Logo"
                        style="width: 50px; height: 50px;">
                </div>
                <h2>Hello! I'm Jeremy.</h2>

            </div>

            <div class="messages-container" id="messages-container">
                <!-- Messages will appear here -->
            </div>

            <div class="suggestions" id="suggestions">
                <button class="suggestion-chip" onclick="sendSuggestion('What does RePut do in sustainability?')">What
                    does RePut do?</button>
                <button class="suggestion-chip"
                    onclick="sendSuggestion('How does RePut track supply-chain impact?')">Track supply-chain
                    impact</button>
                <button class="suggestion-chip" onclick="sendSuggestion('What data does RePut platform use?')">Data
                    platform details</button>
            </div>
        </main>

        <footer class="input-area">
            <div class="input-wrapper">
                <input type="text" id="user-input" placeholder="Ask Jeremy anything about RePut..." autocomplete="off">
                <button id="send-btn" aria-label="Send message">
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </div>
            <!-- <div class="footer-text">Powered by RePut.AI</div> -->
        </footer>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>

</html>
